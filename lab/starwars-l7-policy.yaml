# Classic Cilium L7 demo: Empire tie-fighters (org=empire) may POST
# /v1/request-landing on the deathstar; rebel X-wings (org=alliance) are dropped
# at L3/L4, and even an allowed Empire ship is denied PUT /v1/exhaust-port at L7.
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "rule-deathstar"
spec:
  description: "L7 policy to restrict access to the deathstar landing API"
  endpointSelector:
    matchLabels:
      org: empire
      class: deathstar
  ingress:
    - fromEndpoints:
        - matchLabels:
            org: empire
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
          rules:
            http:
              - method: "POST"
                path: "/v1/request-landing"
